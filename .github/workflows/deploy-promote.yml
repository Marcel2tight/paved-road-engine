name: Promote Infrastructure

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod
      component:
        description: "Infrastructure component"
        required: true
        type: choice
        options:
          - cloud-run
      release_tag:
        description: "Previously built and signed release tag"
        required: true
        default: "v1.0.1"
        type: string

permissions:
  contents: read

concurrency:
  group: promote-${{ inputs.target_environment }}-${{ inputs.component }}
  cancel-in-progress: false

env:
  RELEASE_METADATA_TYPE: https://paved-road-platform.dev/attestations/release-metadata/v1

jobs:
  trust-gate:
    name: Verify trusted dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require the protected main branch
        shell: bash
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "${DISPATCH_REF}" != "refs/heads/main" ]; then
            echo "::error::Promotion must be dispatched from refs/heads/main; received ${DISPATCH_REF}."
            exit 1
          fi

          if [[ ! "${DISPATCH_SHA}" =~ ^[a-f0-9]{40}$ ]]; then
            echo "::error::The triggering commit SHA is invalid."
            exit 1
          fi

          echo "Trusted dispatch accepted for ${DISPATCH_SHA}."

  approval-gate:
    name: "Approve (${{ inputs.target_environment }})"
    needs: trust-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    environment: ${{ inputs.target_environment == 'prod' && 'prod-approval' || 'stage-approval' }}
    steps:
      - name: Record pre-mutation approval
        run: |
          echo "Promotion of ${{ inputs.release_tag }} to ${{ inputs.target_environment }} approved."

  promotion-plan:
    name: "Plan (${{ inputs.target_environment }})"
    needs:
      - trust-gate
      - approval-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    outputs:
      expected_digest_uri: ${{ steps.image.outputs.target_digest_uri }}
      execution_context_sha256: ${{ steps.context.outputs.sha256 }}
      terraform_plan_sha256: ${{ steps.plan-hash.outputs.sha256 }}

    environment: ${{ format('{0}-plan', inputs.target_environment) }}

    env:
      TF_WORKING_DIR: ${{ vars.TF_ROOT }}
      TF_IN_AUTOMATION: true
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir="${TF_WORKING_DIR}" init -reconfigure

      - name: Select Terraform workspace
        shell: bash
        run: |
          terraform -chdir="${TF_WORKING_DIR}" workspace select default

      - name: Verify Terraform workspace
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE="$(terraform -chdir="${TF_WORKING_DIR}" workspace show)"
          if [ "${WORKSPACE}" != "default" ]; then
            echo "::error::Expected Terraform workspace default; received ${WORKSPACE}."
            exit 1
          fi
          echo "Terraform workspace verified without exposing state contents."

      - name: Terraform validate
        run: terraform -chdir="${TF_WORKING_DIR}" validate

      - name: Configure Artifact Registry authentication
        shell: bash
        run: |
          gcloud auth configure-docker \
            "${{ vars.GCP_REGION }}-docker.pkg.dev" \
            --quiet

      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Install SLSA verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Bind plan execution context
        id: context
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          COMPONENT: ${{ inputs.component }}
          TF_ROOT: ${{ vars.TF_ROOT }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
          DEPLOYER_SERVICE_ACCOUNT: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
        run: |
          set -euo pipefail

          CONTEXT="$(
            printf '%s\n' \
              "${TARGET_ENVIRONMENT}" \
              "${COMPONENT}" \
              "${TF_ROOT}" \
              "${GCP_PROJECT_ID}" \
              "${GCP_REGION}" \
              "${WIF_PROVIDER}" \
              "${DEPLOYER_SERVICE_ACCOUNT}" \
              "${CLOUD_RUN_SERVICE}"
          )"
          CONTEXT_SHA256="$(printf '%s' "${CONTEXT}" | sha256sum | awk '{print $1}')"
          echo "sha256=${CONTEXT_SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Resolve promotion references
        id: image
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_PROJECT_ID: ${{ vars.SOURCE_PROJECT_ID }}
          BUILD_SOURCE_PROJECT_ID: ${{ vars.BUILD_SOURCE_PROJECT_ID }}
          STAGE_PROJECT_ID: ${{ vars.STAGE_PROJECT_ID }}
          TARGET_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          REGION: ${{ vars.GCP_REGION }}
          REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use semantic version format such as v1.0.1."
            exit 1
          fi

          CONFIGURED_IMAGE="$(
            printf 'var.image\n' |
              terraform -chdir="${TF_WORKING_DIR}" console |
              jq -er .
          )"

          CONFIGURED_VERSION="$(
            printf 'var.env_vars["APP_VERSION"]\n' |
              terraform -chdir="${TF_WORKING_DIR}" console |
              jq -er .
          )"

          if [ "${CONFIGURED_VERSION}" != "${RELEASE_TAG}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match APP_VERSION ${CONFIGURED_VERSION}."
            exit 1
          fi

          TARGET_REPOSITORY="${REGION}-docker.pkg.dev/${TARGET_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}"
          EXPECTED_PREFIX="${TARGET_REPOSITORY}@"

          if [[ "${CONFIGURED_IMAGE}" != "${EXPECTED_PREFIX}"* ]]; then
            echo "::error::Target Terraform must reference an image in ${TARGET_REPOSITORY}."
            exit 1
          fi

          IMAGE_DIGEST="${CONFIGURED_IMAGE#"${EXPECTED_PREFIX}"}"

          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "::error::Target Terraform must reference an immutable sha256 digest."
            exit 1
          fi

          case "${TARGET_ENVIRONMENT}" in
            stage)
              if [ "${SOURCE_PROJECT_ID}" != "${BUILD_SOURCE_PROJECT_ID}" ]; then
                echo "::error::Stage must source its artifact from the original build project."
                exit 1
              fi
              ;;
            prod)
              if [ -z "${STAGE_PROJECT_ID}" ] || [ "${SOURCE_PROJECT_ID}" != "${STAGE_PROJECT_ID}" ]; then
                echo "::error::Production must source its artifact from the configured Stage project."
                exit 1
              fi
              if [ "${SOURCE_PROJECT_ID}" = "${BUILD_SOURCE_PROJECT_ID}" ]; then
                echo "::error::Production cannot bypass Stage by sourcing directly from the build project."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported target environment ${TARGET_ENVIRONMENT}."
              exit 1
              ;;
          esac
          SOURCE_DIGEST_URI="${REGION}-docker.pkg.dev/${SOURCE_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}@${IMAGE_DIGEST}"
          BUILD_DIGEST_URI="${REGION}-docker.pkg.dev/${BUILD_SOURCE_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}@${IMAGE_DIGEST}"
          TARGET_TAG_URI="${TARGET_REPOSITORY}:${RELEASE_TAG}"
          TARGET_DIGEST_URI="${TARGET_REPOSITORY}@${IMAGE_DIGEST}"

          {
            echo "digest=${IMAGE_DIGEST}"
            echo "source_digest_uri=${SOURCE_DIGEST_URI}"
            echo "build_digest_uri=${BUILD_DIGEST_URI}"
            echo "target_tag_uri=${TARGET_TAG_URI}"
            echo "target_digest_uri=${TARGET_DIGEST_URI}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify signed release metadata and Cloud Build provenance
        shell: bash
        env:
          BUILD_DIGEST_URI: ${{ steps.image.outputs.build_digest_uri }}
          BUILD_SOURCE_PROJECT_ID: ${{ vars.BUILD_SOURCE_PROJECT_ID }}
          EXPECTED_DIGEST: ${{ steps.image.outputs.digest }}
          EXPECTED_RELEASE_TAG: ${{ inputs.release_tag }}
          TRUSTED_BUILD_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/build-paved-road-image.yml@refs/heads/main
        run: |
          set -euo pipefail

          PROVENANCE_FILE="${RUNNER_TEMP}/source-provenance.json"
          ATTESTATION_FILE="${RUNNER_TEMP}/verified-release-metadata.json"

          gcloud artifacts docker images describe \
            "${BUILD_DIGEST_URI}" \
            --project="${BUILD_SOURCE_PROJECT_ID}" \
            --show-provenance \
            --format=json \
            > "${PROVENANCE_FILE}"

          timeout 5m cosign verify-attestation \
            "${BUILD_DIGEST_URI}" \
            --type "${RELEASE_METADATA_TYPE}" \
            --certificate-identity "${TRUSTED_BUILD_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > "${ATTESTATION_FILE}"

          PREDICATE="$(
            jq -er '
              .payload
              | @base64d
              | fromjson
              | .predicate
            ' "${ATTESTATION_FILE}"
          )"
          SOURCE_URI="$(jq -er '.cloud_build_source_uri' <<<"${PREDICATE}")"
          METADATA_REPOSITORY="$(jq -er '.repository' <<<"${PREDICATE}")"
          METADATA_REF="$(jq -er '.git_ref' <<<"${PREDICATE}")"
          METADATA_COMMIT="$(jq -er '.git_commit' <<<"${PREDICATE}")"
          METADATA_TAG="$(jq -er '.release_tag' <<<"${PREDICATE}")"
          METADATA_DIGEST="$(jq -er '.image_digest' <<<"${PREDICATE}")"

          [ "${METADATA_REPOSITORY}" = "${GITHUB_REPOSITORY}" ] || {
            echo "::error::Release metadata repository mismatch."; exit 1;
          }
          [ "${METADATA_REF}" = "refs/heads/main" ] || {
            echo "::error::Release metadata is not bound to main."; exit 1;
          }
          [[ "${METADATA_COMMIT}" =~ ^[a-f0-9]{40}$ ]] || {
            echo "::error::Release metadata commit is invalid."; exit 1;
          }
          [ "${METADATA_TAG}" = "${EXPECTED_RELEASE_TAG}" ] || {
            echo "::error::Release metadata tag mismatch."; exit 1;
          }
          [ "${METADATA_DIGEST}" = "${EXPECTED_DIGEST}" ] || {
            echo "::error::Release metadata digest mismatch."; exit 1;
          }
          case "${SOURCE_URI}" in
            "gs://${BUILD_SOURCE_PROJECT_ID}_cloudbuild/source/"*) ;;
            *)
              echo "::error::Signed source URI is outside the trusted Cloud Build bucket."
              exit 1
              ;;
          esac

          timeout 5m slsa-verifier verify-image \
            "${BUILD_DIGEST_URI}" \
            --provenance-path "${PROVENANCE_FILE}" \
            --source-uri "${SOURCE_URI}" \
            --builder-id \
              "https://cloudbuild.googleapis.com/GoogleHostedWorker"

          echo "Signed release metadata and Cloud Build provenance verification passed."

      - name: Enforce immutable Artifact Registry tags
        shell: bash
        env:
          REGION: ${{ vars.GCP_REGION }}
          REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
          SOURCE_PROJECT_ID: ${{ vars.SOURCE_PROJECT_ID }}
          TARGET_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          for PROJECT_ID in "${SOURCE_PROJECT_ID}" "${TARGET_PROJECT_ID}"; do
            IMMUTABLE_TAGS="$(
              gcloud artifacts repositories describe "${REPOSITORY}" \
                --project="${PROJECT_ID}" \
                --location="${REGION}" \
                --format=json |
                jq -r '.dockerConfig.immutableTags // false'
            )"

            if [ "${IMMUTABLE_TAGS}" != "true" ]; then
              echo "::error::Artifact Registry immutable tags are not enabled for ${PROJECT_ID}/${REPOSITORY}."
              exit 1
            fi
          done

          echo "Artifact Registry immutable-tag policy verified."

      - name: Protect immutable release tag
        id: tag
        shell: bash
        env:
          EXPECTED_DIGEST: ${{ steps.image.outputs.digest }}
          TARGET_TAG_URI: ${{ steps.image.outputs.target_tag_uri }}
        run: |
          set -euo pipefail

          EXISTING_DIGEST="$(
            gcloud artifacts docker images describe \
              "${TARGET_TAG_URI}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format="value(image_summary.digest)" \
              2>/dev/null || true
          )"

          if [ -n "${EXISTING_DIGEST}" ] && \
             [ "${EXISTING_DIGEST}" != "${EXPECTED_DIGEST}" ]; then
            echo "Release tag already points to a different digest."
            echo "Existing: ${EXISTING_DIGEST}"
            echo "Expected: ${EXPECTED_DIGEST}"
            exit 1
          fi

          if [ -n "${EXISTING_DIGEST}" ]; then
            echo "Release tag already points to the expected digest; continuing idempotently."
            echo "copy_required=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Release tag is available for promotion."
            echo "copy_required=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify signed source artifact
        shell: bash
        env:
          SOURCE_DIGEST_URI: ${{ steps.image.outputs.source_digest_uri }}
          CERTIFICATE_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/build-paved-road-image.yml@refs/heads/main
        run: |
          set -euo pipefail

          timeout 5m cosign verify \
            "${SOURCE_DIGEST_URI}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

          timeout 5m cosign verify-attestation \
            "${SOURCE_DIGEST_URI}" \
            --type spdxjson \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

          timeout 5m cosign verify-attestation \
            "${SOURCE_DIGEST_URI}" \
            --type "${RELEASE_METADATA_TYPE}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

      - name: Copy image and supply-chain artifacts
        if: steps.tag.outputs.copy_required == 'true'
        shell: bash
        env:
          SOURCE_DIGEST_URI: ${{ steps.image.outputs.source_digest_uri }}
          TARGET_TAG_URI: ${{ steps.image.outputs.target_tag_uri }}
        run: |
          set -euo pipefail

          # Artifact Registry returned a Content-Length mismatch to ORAS.
          # Cosign copy uses its registry-compatible copy implementation and
          # preserves the image, signature, and attestation.
          timeout 10m cosign copy \
            --timeout 5m \
            "${SOURCE_DIGEST_URI}" \
            "${TARGET_TAG_URI}"

      - name: Verify promoted digest
        shell: bash
        env:
          EXPECTED_DIGEST: ${{ steps.image.outputs.digest }}
          TARGET_TAG_URI: ${{ steps.image.outputs.target_tag_uri }}
        run: |
          set -euo pipefail

          ACTUAL_DIGEST="$(
            gcloud artifacts docker images describe \
              "${TARGET_TAG_URI}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format="value(image_summary.digest)"
          )"

          if [ "${ACTUAL_DIGEST}" != "${EXPECTED_DIGEST}" ]; then
            echo "Promoted digest ${ACTUAL_DIGEST} does not match ${EXPECTED_DIGEST}."
            exit 1
          fi

          echo "Promoted image digest matches the verified source digest."

      - name: Verify promoted signature and SBOM attestation
        shell: bash
        env:
          TARGET_DIGEST_URI: ${{ steps.image.outputs.target_digest_uri }}
          CERTIFICATE_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/build-paved-road-image.yml@refs/heads/main
        run: |
          set -euo pipefail

          timeout 5m cosign verify \
            "${TARGET_DIGEST_URI}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

          timeout 5m cosign verify-attestation \
            "${TARGET_DIGEST_URI}" \
            --type spdxjson \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

          timeout 5m cosign verify-attestation \
            "${TARGET_DIGEST_URI}" \
            --type "${RELEASE_METADATA_TYPE}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/dev/null

      - name: Terraform plan
        run: terraform -chdir="${TF_WORKING_DIR}" plan -input=false -lock-timeout=5m -out=tfplan

      - name: Hash Terraform plan
        id: plan-hash
        shell: bash
        run: |
          set -euo pipefail
          PLAN_SHA256="$(sha256sum "${TF_WORKING_DIR}/tfplan" | awk '{print $1}')"
          echo "sha256=${PLAN_SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.target_environment }}-${{ inputs.component }}-tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  promotion-apply:
    name: "Apply (${{ inputs.target_environment }})"
    needs: promotion-plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    environment: ${{ inputs.target_environment }}

    env:
      TF_WORKING_DIR: ${{ vars.TF_ROOT }}
      TF_IN_AUTOMATION: true
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify plan/apply execution context
        shell: bash
        env:
          EXPECTED_CONTEXT_SHA256: ${{ needs.promotion-plan.outputs.execution_context_sha256 }}
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          COMPONENT: ${{ inputs.component }}
          TF_ROOT: ${{ vars.TF_ROOT }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
          DEPLOYER_SERVICE_ACCOUNT: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
        run: |
          set -euo pipefail

          CONTEXT="$(
            printf '%s\n' \
              "${TARGET_ENVIRONMENT}" \
              "${COMPONENT}" \
              "${TF_ROOT}" \
              "${GCP_PROJECT_ID}" \
              "${GCP_REGION}" \
              "${WIF_PROVIDER}" \
              "${DEPLOYER_SERVICE_ACCOUNT}" \
              "${CLOUD_RUN_SERVICE}"
          )"
          ACTUAL_CONTEXT_SHA256="$(printf '%s' "${CONTEXT}" | sha256sum | awk '{print $1}')"

          if [ "${ACTUAL_CONTEXT_SHA256}" != "${EXPECTED_CONTEXT_SHA256}" ]; then
            echo "::error::Plan and apply GitHub environments resolve to different execution contexts."
            exit 1
          fi

          echo "Plan/apply execution context is identical."

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir="${TF_WORKING_DIR}" init -reconfigure

      - name: Select Terraform workspace
        shell: bash
        run: |
          terraform -chdir="${TF_WORKING_DIR}" workspace select default

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.target_environment }}-${{ inputs.component }}-tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Verify Terraform plan integrity
        shell: bash
        env:
          EXPECTED_PLAN_SHA256: ${{ needs.promotion-plan.outputs.terraform_plan_sha256 }}
        run: |
          set -euo pipefail
          ACTUAL_PLAN_SHA256="$(sha256sum "${TF_WORKING_DIR}/tfplan" | awk '{print $1}')"
          if [ "${ACTUAL_PLAN_SHA256}" != "${EXPECTED_PLAN_SHA256}" ]; then
            echo "::error::Downloaded Terraform plan failed its SHA-256 integrity check."
            exit 1
          fi
          echo "Terraform plan integrity verified."

      - name: Terraform apply
        run: terraform -chdir="${TF_WORKING_DIR}" apply -input=false -auto-approve tfplan

      - name: Verify Cloud Run readiness and traffic
        shell: bash
        run: |
          set -euo pipefail

          SERVICE="${{ vars.CLOUD_RUN_SERVICE }}"
          REGION="${{ vars.GCP_REGION }}"
          PROJECT="${{ vars.GCP_PROJECT_ID }}"

          SERVICE_JSON="$(
            gcloud run services describe "${SERVICE}" \
              --platform=managed \
              --region="${REGION}" \
              --project="${PROJECT}" \
              --format=json
          )"

          LATEST_CREATED="$(
            jq -r '.status.latestCreatedRevisionName // empty' \
              <<<"${SERVICE_JSON}"
          )"

          LATEST_READY="$(
            jq -r '.status.latestReadyRevisionName // empty' \
              <<<"${SERVICE_JSON}"
          )"

          READY_STATUS="$(
            jq -r '
              .status.conditions[]
              | select(.type == "Ready")
              | .status
            ' <<<"${SERVICE_JSON}"
          )"

          LATEST_TRAFFIC_PERCENT="$(
            jq -r --arg revision "${LATEST_READY}" '
              [
                .status.traffic[]?
                | select(
                    .latestRevision == true or
                    .revisionName == $revision or
                    .revision == $revision
                  )
                | (.percent // 0)
              ]
              | add // 0
            ' <<<"${SERVICE_JSON}"
          )"

          printf 'Service:                 %s\n' "${SERVICE}"
          printf 'Latest created revision: %s\n' "${LATEST_CREATED}"
          printf 'Latest ready revision:   %s\n' "${LATEST_READY}"
          printf 'Ready condition:         %s\n' "${READY_STATUS}"
          printf 'Latest revision traffic: %s%%\n' "${LATEST_TRAFFIC_PERCENT}"

          if [ -z "${LATEST_CREATED}" ] || [ -z "${LATEST_READY}" ]; then
            echo "::error::Cloud Run did not report created and ready revisions."
            exit 1
          fi

          if [ "${LATEST_CREATED}" != "${LATEST_READY}" ]; then
            echo "::error::Latest created revision is not the latest ready revision."
            exit 1
          fi

          if [ "${READY_STATUS}" != "True" ]; then
            echo "::error::Cloud Run service Ready condition is not True."
            exit 1
          fi

          if [ "${LATEST_TRAFFIC_PERCENT}" != "100" ]; then
            echo "::error::Latest ready revision is not receiving 100% of traffic."
            exit 1
          fi

          echo "PASS: Cloud Run is ready and the latest revision receives 100% traffic."

      - name: Verify deployed immutable digest
        shell: bash
        env:
          EXPECTED_DIGEST_URI: ${{ needs.promotion-plan.outputs.expected_digest_uri }}
        run: |
          set -euo pipefail

          if [[ ! "${EXPECTED_DIGEST_URI}" =~ @sha256:[a-f0-9]{64}$ ]]; then
            echo "::error::Expected digest output is missing or invalid: ${EXPECTED_DIGEST_URI}"
            exit 1
          fi

          LATEST_READY_REVISION="$(
            gcloud run services describe \
              "${{ vars.CLOUD_RUN_SERVICE }}" \
              --platform=managed \
              --region="${{ vars.GCP_REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status.latestReadyRevisionName)'
          )"

          if [ -z "${LATEST_READY_REVISION}" ]; then
            echo "::error::Cloud Run did not report a latest ready revision."
            exit 1
          fi

          DEPLOYED_DIGEST_URI="$(
            gcloud run revisions describe \
              "${LATEST_READY_REVISION}" \
              --region="${{ vars.GCP_REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status.imageDigest)'
          )"

          printf 'Expected digest: %s\n' "${EXPECTED_DIGEST_URI}"
          printf 'Ready revision:  %s\n' "${LATEST_READY_REVISION}"
          printf 'Deployed digest: %s\n' "${DEPLOYED_DIGEST_URI}"

          if [ "${DEPLOYED_DIGEST_URI}" != "${EXPECTED_DIGEST_URI}" ]; then
            echo "::error::Cloud Run is not running the approved immutable digest."
            exit 1
          fi

          echo "PASS: Cloud Run is running the approved immutable digest."

      - name: Verify authenticated application health
        shell: bash
        run: |
          set -euo pipefail

          PROJECT="${{ vars.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION }}"
          SERVICE="${{ vars.CLOUD_RUN_SERVICE }}"
          SCHEDULER_JOB="${SERVICE}-health-probe"

          PROBE_STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          printf 'Project:          %s\n' "${PROJECT}"
          printf 'Region:           %s\n' "${REGION}"
          printf 'Scheduler job:    %s\n' "${SCHEDULER_JOB}"
          printf 'Probe started at: %s\n' "${PROBE_STARTED_AT}"

          gcloud scheduler jobs run "${SCHEDULER_JOB}" \
            --project="${PROJECT}" \
            --location="${REGION}"

          PROBE_STATUS=""

          for ATTEMPT in {1..24}; do
            PROBE_STATUS="$(
              gcloud logging read \
                "resource.type=\"cloud_scheduler_job\"
                 AND resource.labels.job_id=\"${SCHEDULER_JOB}\"
                 AND jsonPayload.@type=\"type.googleapis.com/google.cloud.scheduler.logging.AttemptFinished\"
                 AND timestamp>=\"${PROBE_STARTED_AT}\"" \
                --project="${PROJECT}" \
                --limit=1 \
                --order=desc \
                --format='value(httpRequest.status)'
            )"

            if [ -n "${PROBE_STATUS}" ]; then
              break
            fi

            printf 'Waiting for probe result (%s/24)...\n' "${ATTEMPT}"
            sleep 5
          done

          printf 'Fresh probe HTTP status: %s\n' "${PROBE_STATUS:-not found}"

          if [ -z "${PROBE_STATUS}" ]; then
            echo "::error::No completed health-probe execution was found within 120 seconds."
            exit 1
          fi

          if [ "${PROBE_STATUS}" != "200" ]; then
            echo "::error::Authenticated /health probe returned HTTP ${PROBE_STATUS}; expected 200."
            exit 1
          fi

          echo "PASS: Authenticated internal /health probe returned HTTP 200."

  notify:
    name: Notify promotion result
    if: always()
    needs:
      - trust-gate
      - approval-gate
      - promotion-plan
      - promotion-apply
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Notify Slack
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TRUST_RESULT: ${{ needs.trust-gate.result }}
          APPROVAL_RESULT: ${{ needs.approval-gate.result }}
          PLAN_RESULT: ${{ needs.promotion-plan.result }}
          APPLY_RESULT: ${{ needs.promotion-apply.result }}
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          COMPONENT: ${{ inputs.component }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi

          if [ "${TRUST_RESULT}" = "success" ] &&
             [ "${APPROVAL_RESULT}" = "success" ] &&
             [ "${PLAN_RESULT}" = "success" ] &&
             [ "${APPLY_RESULT}" = "success" ]; then
            TITLE="🚀 Promotion Successful"
          else
            TITLE="🔥 Promotion Failed"
          fi

          MESSAGE="$(
            printf '%s\nEnvironment: %s\nComponent: %s\nCommit: %s\nActor: %s\nTrust: %s | Approval: %s | Plan: %s | Apply: %s\nLogs: %s' \
              "${TITLE}" \
              "${TARGET_ENVIRONMENT}" \
              "${COMPONENT}" \
              "${COMMIT_SHA}" \
              "${ACTOR}" \
              "${TRUST_RESULT}" \
              "${APPROVAL_RESULT}" \
              "${PLAN_RESULT}" \
              "${APPLY_RESULT}" \
              "${RUN_URL}"
          )"

          jq -n --arg text "${MESSAGE}" '{text: $text}' |
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --retry 3 \
              --header 'Content-Type: application/json' \
              --data-binary @- \
              "${SLACK_WEBHOOK_URL}"