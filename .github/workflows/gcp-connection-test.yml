name: GCP Connection Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-oidc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/915035381641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: paved-road-sa@imposing-fx-413205.iam.gserviceaccount.com
          create_credentials_file: true

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set Project
        run: gcloud config set project imposing-fx-413205

      - name: Verify Authentication (CRITICAL PROOF)
        run: |
          echo "========================================="
          echo "     OIDC AUTHENTICATION VERIFICATION"
          echo "========================================="
          echo ""
          echo "Credentialed Accounts:"
          gcloud auth list
          echo ""
          echo "Active Configuration:"
          gcloud config list
          echo ""
          echo "Project Details:"
          gcloud projects describe imposing-fx-413205 --format="yaml(projectId, name, lifecycleState)"
          echo ""
          echo "========================================="
          echo "OIDC CONNECTION SUCCESSFUL"
          echo "========================================="
