name: GCP Connection Test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          workload_identity_provider: projects/915035381641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: paved-road-sa@imposing-fx-413205.iam.gserviceaccount.com
          token_format: access_token
          create_credentials_file: true

      - name: Verify GCP Login
        run: |
          echo "========================================="
          echo "     GCP CONNECTION VERIFICATION"
          echo "========================================="
          echo ""
          echo "Active Accounts:"
          gcloud auth list
          echo ""
          echo "Project Details:"
          gcloud projects describe imposing-fx-413205
          echo ""
          echo "Connection successful!"
