name: GCP Connection Test

on: 
  workflow_dispatch:

# Suppress Node.js 20 deprecation warning
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/915035381641/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'paved-road-sa@imposing-fx-413205.iam.gserviceaccount.com'

      - name: Verify GCP Login
        run: |
          echo "========================================="
          echo "     GCP CONNECTION VERIFICATION"
          echo "========================================="
          echo ""
          
          echo "íł‹ Active Accounts:"
          gcloud auth list
          
          echo ""
          echo "íż—ď¸Ź  Project Details:"
          gcloud projects describe imposing-fx-413205
          
          echo ""
          echo "âś… GCP connection successful!"
