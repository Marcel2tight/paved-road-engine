name: GCP Connection Test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          workload_identity_provider: projects/915035381641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: paved-road-sa@imposing-fx-413205.iam.gserviceaccount.com
          token_format: access_token
          create_credentials_file: true

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          version: '>= 500.0.0'

      - name: Verify gcloud auth
        run: |
          echo "========================================="
          echo "     GCP AUTHENTICATION VERIFICATION"
          echo "========================================="
          echo ""
          
          echo "ні‹ Active Accounts:"
          gcloud auth list
          
          echo ""
          echo "вљ™пёЏ  Current Configuration:"
          gcloud config list
          
          echo ""
          echo "нґ‘ ADC Credentials File:"
          echo "   Location: $GOOGLE_APPLICATION_CREDENTIALS"
          ls -la "$GOOGLE_APPLICATION_CREDENTIALS" 2>/dev/null || echo "   (not set)"
          
          echo ""
          echo "нї—пёЏ  Project Details:"
          gcloud projects describe imposing-fx-413205 --format="yaml(projectId, name, lifecycleState)"
          
          echo ""
          echo "ні¦ Storage Buckets:"
          gcloud storage ls --project=imposing-fx-413205 2>/dev/null || echo "No buckets found"
          
          echo ""
          echo "нјђ VPC Networks:"
          gcloud compute networks list --project=imposing-fx-413205 --format="table(name, subnetworksMode, mtu)" 2>/dev/null || echo "No networks found"
          
          echo ""
          echo "========================================="
          echo "     вњ… CONNECTION SUCCESSFUL"
          echo "========================================="
