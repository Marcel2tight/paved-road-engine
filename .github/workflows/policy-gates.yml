name: Policy Gates

on:
pull_request:
paths:
- 'terraform/**'
- '.github/workflows/policy-gates.yml'
workflow_dispatch:

permissions:
contents: read
pull-requests: read
security-events: write

jobs:
policy-gates:
runs-on: ubuntu-latest

steps:
- name: Checkout
uses: actions/checkout@v4

- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: '3.12'

- name: Install Checkov
run: |
pip install checkov

- name: Run Checkov
run: |
mkdir -p reports
checkov -d terraform \
--framework terraform \
--output sarif \
--output-file-path reports/checkov.sarif \
--quiet || true

- name: Install tfsec
run: |
curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

- name: Run tfsec
run: |
mkdir -p reports
tfsec terraform \
--format sarif \
--out reports/tfsec || true

- name: Enforce policy gate
run: |
if grep -q '"severity":"HIGH"' reports/*.sarif || grep -q '"severity":"CRITICAL"' reports/*.sarif; then
echo "Blocking findings detected"
exit 1
fi
