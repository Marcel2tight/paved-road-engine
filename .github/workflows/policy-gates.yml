name: Policy Gates

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/policy-gates.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  policy-gates:
    name: Policy Gates
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          config_file: terraform/policies/checkov.yaml
          output_format: sarif
          output_file_path: reports/checkov.sarif
          quiet: true
          soft_fail: false
          download_external_modules: true

      - name: Upload Checkov SARIF
        if: always() && hashFiles('reports/checkov.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/checkov.sarif
          category: checkov

      - name: Run tfsec
        id: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          format: sarif
          additional_args: >-
            --out tfsec
            --outdir reports

      - name: Upload tfsec SARIF
        if: always() && hashFiles('reports/tfsec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/tfsec.sarif
          category: tfsec

      - name: Enforce tfsec gate
        if: always()
        run: |
          if [ -f reports/tfsec.sarif ]; then
            if grep -q '"level":"error"' reports/tfsec.sarif || grep -q '"severity":"HIGH"' reports/tfsec.sarif || grep -q '"severity":"CRITICAL"' reports/tfsec.sarif; then
              echo "tfsec detected blocking findings."
              exit 1
            fi
          fi

      - name: Summarize policy gate results
        if: always()
        run: |
          {
            echo "## Policy Gates Summary"
            echo ""
            echo "- Checkov SARIF uploaded: $( [ -f reports/checkov.sarif ] && echo yes || echo no )"
            echo "- tfsec SARIF uploaded: $( [ -f reports/tfsec.sarif ] && echo yes || echo no )"
            echo "- Workflow run URL: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } >> "$GITHUB_STEP_SUMMARY"
