name: Policy Gates

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/policy-gates.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  policy-gates:
    name: Policy Gates
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        run: |
          mkdir -p reports
          checkov -d terraform \
            --framework terraform \
            --config-file terraform/policies/checkov.yaml \
            --output sarif \
            --output-file-path reports/checkov.sarif \
            --download-external-modules true \
            --quiet

      - name: Upload Checkov SARIF
        if: always() && hashFiles('reports/checkov.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/checkov.sarif
          category: checkov

      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: Run tfsec
        run: |
          mkdir -p reports
          tfsec terraform \
            --format sarif \
            --out reports/tfsec || true

      - name: Upload tfsec SARIF
        if: always() && hashFiles('reports/tfsec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/tfsec.sarif
          category: tfsec

      - name: Enforce policy gate
        run: |
          failed=0

          if [ -f reports/checkov.sarif ]; then
            if grep -q '"level":"error"' reports/checkov.sarif || \
               grep -q '"severity":"HIGH"' reports/checkov.sarif || \
               grep -q '"severity":"CRITICAL"' reports/checkov.sarif; then
              echo "Blocking findings detected in Checkov results."
              failed=1
            fi
          fi

          if [ -f reports/tfsec.sarif ]; then
            if grep -q '"level":"error"' reports/tfsec.sarif || \
               grep -q '"severity":"HIGH"' reports/tfsec.sarif || \
               grep -q '"severity":"CRITICAL"' reports/tfsec.sarif; then
              echo "Blocking findings detected in tfsec results."
              failed=1
            fi
          fi

          if [ "$failed" -ne 0 ]; then
            echo "Policy gate failed."
            exit 1
          fi

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Policy Gates Summary"
            echo ""
            echo "- Checkov SARIF present: $( [ -f reports/checkov.sarif ] && echo yes || echo no )"
            echo "- tfsec SARIF present: $( [ -f reports/tfsec.sarif ] && echo yes || echo no )"
            echo "- Run URL: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } >> "$GITHUB_STEP_SUMMARY"
